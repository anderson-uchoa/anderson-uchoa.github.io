index:
  about_label: "Sobre Mim"
  tagline: "Investigo como o software evolui e como os desenvolvedores constroem sistemas melhores com ferramentas inteligentes."
  research_interests: Interesses de Pesquisa
  highlights_title: Destaques
  collab_title: "Vamos colaborar!"
  collab_text: "Estou sempre aberto a novas colaborações de pesquisa, oportunidades de visita e projetos conjuntos em Engenharia de Software e Desenvolvimento Assistido por IA."
  collab_btn: "Entre em contato"
  selected_pubs: "Publicações Selecionadas"
  view_all_pubs: "Ver todas as publicações"
  pubs_with: "com"
  positions: Posições Acadêmicas
  education: Formação
  download_cv: Baixar CV
  advisor: "Orientador:"
  gpa: "Média"
  bio_1: >
    Sou pesquisador e Professor de Engenharia de Software na
    <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">Universidade Federal do Ceará (UFC)</a>, Brasil,
    e coordenador do <a href="https://reset-ufc.github.io/" target="_blank" rel="noopener noreferrer">RESET Lab</a>.
  bio_2: >
    Minha pesquisa foca em engenharia de software empírica, evolução e manutenção de software,
    fatores humanos, ferramentas de desenvolvimento inteligentes e a interação entre sistemas de software
    e ambientes intensivos em dados.
    Obtive meu Doutorado em Engenharia de Software pela <a href="https://www.puc-rio.br" target="_blank" rel="noopener noreferrer">PUC-Rio</a> (2021),
    meu Mestrado pela <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">UFC</a> (2016),
    desenvolvido em cooperação com a <a href="https://www.di.uniroma1.it/" target="_blank" rel="noopener noreferrer">Sapienza University of Rome</a>, Itália.
  bio_3: >
    Colaboro ativamente com pesquisadores do Brasil e do exterior,
    incluindo parcerias no Reino Unido e engajamento contínuo com instituições nos EUA.
    Tenho interesse em colaborações internacionais de pesquisa, oportunidades de visita
    e projetos conjuntos em engenharia de software e desenvolvimento assistido por IA.


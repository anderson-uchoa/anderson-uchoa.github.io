  advisor: "Advisor:"
  gpa: "GPA"
  bio_1: >
    I am a Software Engineering researcher and Professor at the
    <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">Federal University of Ceará (UFC)</a>, Brazil,
    and Head of the <a href="https://reset-ufc.github.io/" target="_blank" rel="noopener noreferrer">RESET Lab</a>.
    I am currently a Postdoctoral Researcher at <a href="https://www.ncsu.edu/" target="_blank" rel="noopener noreferrer">North Carolina State University</a>.
  bio_2: >
    My research focuses on empirical software engineering, software evolution and maintenance,
    human factors, CI/CD security automation, and AI-assisted development.
    I design empirical studies and tools to improve software quality, maintenance, and developer productivity.
  bio_3: >
    I hold a PhD and MSc in Software Engineering from the
    <a href="https://www.puc-rio.br" target="_blank" rel="noopener noreferrer">Pontifical Catholic University of Rio de Janeiro</a>
    and a BSc in Software Engineering from the
    <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">Federal University of Ceará</a>,
    developed in cooperation with <a href="https://www.di.uniroma1.it/" target="_blank" rel="noopener noreferrer">Sapienza University of Rome</a>, Italy.


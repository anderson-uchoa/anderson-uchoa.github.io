index:
  about_label: "About Me"
  tagline: "I study how software evolves and how people build better software—together with intelligent tools."
  research_interests: Research Interests
  highlights_title: Highlights
  selected_pubs: "Selected Publications"
  view_all_pubs: "View all publications"
  pubs_with: "with"
  positions: Academic Positions
  education: Education
  download_cv: Download CV
  advisor: "Advisor:"
  gpa: "GPA"
  bio_1: >
    I am a Software Engineering researcher and Professor at the
    <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">Federal University of Ceará (UFC)</a>, Brazil,
    and Head of the <a href="https://reset-ufc.github.io/" target="_blank" rel="noopener noreferrer">RESET Lab</a>.
  bio_2: >
    My research focuses on empirical software engineering, software evolution and maintenance,
    human factors, intelligent development tools, and the interplay between software systems
    and data-intensive environments.
    I earned my PhD in Software Engineering from <a href="https://www.puc-rio.br" target="_blank" rel="noopener noreferrer">PUC-Rio</a> (2021),
    my MSc in Software Engineering from <a href="https://www.ufc.br/" target="_blank" rel="noopener noreferrer">UFC</a> (2016),
    developed in cooperation with <a href="https://www.di.uniroma1.it/" target="_blank" rel="noopener noreferrer">Sapienza University of Rome</a>, Italy.
  bio_3: >
    I collaborate with researchers across Brazil and internationally,
    including partnerships in the United Kingdom and ongoing research engagement with U.S. institutions.
    I welcome international research collaborations, visiting opportunities,
    and joint projects in software engineering and AI-supported development.

